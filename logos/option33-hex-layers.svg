<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- HEX LAYERS — multiple layers of overlapping solid hexagons creating depth
       Three layers of hexagons along the F:
         Layer 1 (bottom): dark, large hexes — the foundation
         Layer 2 (middle): medium hexes, offset — fills gaps
         Layer 3 (top): bright, smaller hexes — the highlights
       Each layer overlaps the one below it.
       The overlapping creates a 3D forged-metal appearance,
       like overlapping iron scales. -->

  <defs>
    <linearGradient id="hl33a" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#78350f"/>
      <stop offset="100%" stop-color="#451a03"/>
    </linearGradient>
    <linearGradient id="hl33b" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b45309"/>
      <stop offset="100%" stop-color="#78350f"/>
    </linearGradient>
    <linearGradient id="hl33c" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="200" height="200" rx="28" fill="#0c0c0e"/>

  <!-- ── Layer 1 (bottom): dark foundation hexes ── -->
  <g fill="url(#hl33a)" stroke="url(#hl33a)" stroke-width="1">

    <!-- Vertical column -->
    <polygon points="35,5 53,16 53,42 35,53 17,42 17,16"/>
    <polygon points="35,42 53,53 53,79 35,90 17,79 17,53"/>
    <polygon points="35,79 53,90 53,116 35,127 17,116 17,90"/>
    <polygon points="35,116 53,127 53,153 35,164 17,153 17,127"/>
    <polygon points="35,153 53,164 53,190 35,201 17,190 17,164"/>

    <!-- Top arm -->
    <polygon points="62,-5 80,6 80,32 62,43 44,32 44,6"/>
    <polygon points="89,-5 107,6 107,32 89,43 71,32 71,6"/>
    <polygon points="116,-5 134,6 134,32 116,43 98,32 98,6"/>
    <polygon points="143,-5 161,6 161,32 143,43 125,32 125,6"/>

    <!-- Middle arm -->
    <polygon points="62,95 80,106 80,132 62,143 44,132 44,106"/>
    <polygon points="89,95 107,106 107,132 89,143 71,132 71,106"/>
    <polygon points="116,95 134,106 134,132 116,143 98,132 98,106"/>

  </g>

  <!-- ── Layer 2 (middle): medium hexes, offset by ~10px ── -->
  <g fill="url(#hl33b)" opacity="0.85" stroke="url(#hl33b)" stroke-width="0.8">

    <!-- Vertical offsets (shifted down and right) -->
    <polygon points="49,20 64,29 64,50 49,59 34,50 34,29"/>
    <polygon points="49,57 64,66 64,87 49,96 34,87 34,57"/>
    <polygon points="49,94 64,103 64,124 49,133 34,124 34,94"/>
    <polygon points="49,131 64,140 64,161 49,170 34,161 34,140"/>
    <polygon points="49,168 64,177 64,198 49,207 34,198 34,177"/>

    <!-- Top arm offsets -->
    <polygon points="76,8 91,17 91,38 76,47 61,38 61,17"/>
    <polygon points="103,8 118,17 118,38 103,47 88,38 88,17"/>
    <polygon points="130,8 145,17 145,38 130,47 115,38 115,17"/>

    <!-- Middle arm offsets -->
    <polygon points="76,108 91,117 91,138 76,147 61,138 61,117"/>
    <polygon points="103,108 118,117 118,138 103,147 88,138 88,117"/>

  </g>

  <!-- ── Layer 3 (top): bright highlight hexes ── -->
  <g fill="url(#hl33c)" opacity="0.7" stroke="url(#hl33c)" stroke-width="0.5">

    <!-- Vertical highlights (centered, smaller) -->
    <polygon points="40,28 52,35 52,52 40,59 28,52 28,35"/>
    <polygon points="40,65 52,72 52,89 40,96 28,89 28,72"/>
    <polygon points="40,102 52,109 52,126 40,133 28,126 28,102"/>
    <polygon points="40,139 52,146 52,163 40,170 28,163 28,146"/>

    <!-- Top arm highlights -->
    <polygon points="69,2 81,9 81,26 69,33 57,26 57,9"/>
    <polygon points="96,2 108,9 108,26 96,33 84,26 84,9"/>
    <polygon points="123,2 135,9 135,26 123,33 111,26 111,9"/>

    <!-- Middle arm highlights -->
    <polygon points="69,102 81,109 81,126 69,133 57,126 57,109"/>
    <polygon points="96,102 108,109 108,126 96,133 84,126 84,109"/>

  </g>
</svg>
