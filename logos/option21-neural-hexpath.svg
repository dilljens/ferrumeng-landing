<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- NEURAL F — Hex Path
       A tessellation of hexagons (like a neural tissue grid).
       Most hexagons are dim outlines, but the hexagons along the F
       path are filled and active — like a wave of depolarization
       traveling through neural tissue.
       Zero floating circles. Every hexagon is part of the grid.
       The F emerges from which cells are "firing." -->

  <defs>
    <linearGradient id="h21" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#92400e"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="200" height="200" rx="28" fill="#0c0c0e"/>

  <!-- Hexagon size and positions. Each hex has 6 vertices.
       We use a horizontal offset layout (pointy-top). -->

  <!-- Helper: hex centered at (cx, cy), radius 14 -->
  <!-- Column positions: x=40, 70, 100, 130, 160 -->
  <!-- Row Y: 35, 65, 95, 125, 155 -->

  <!-- ── All inactive hexagons (dim grid) ── -->
  <g stroke="#d97706" stroke-width="0.8" opacity="0.08" fill="none">

    <!-- Row 1 (y=35) -->
    <polygon points="70,20 88,35 88,62 70,77 52,62 52,35"/>
    <polygon points="130,20 148,35 148,62 130,77 112,62 112,35"/>
    <polygon points="160,38 178,53 178,80 160,95 142,80 142,53"/>

    <!-- Row 2 (y=65) -->
    <polygon points="40,38 58,53 58,80 40,95 22,80 22,53"/>
    <polygon points="100,38 118,53 118,80 100,95 82,80 82,53"/>
    <polygon points="160,65 178,80 178,107 160,122 142,107 142,80"/>

    <!-- Row 3 (y=95) -->
    <polygon points="40,65 58,80 58,107 40,122 22,107 22,80"/>
    <polygon points="100,65 118,80 118,107 100,122 82,107 82,80"/>
    <polygon points="160,92 178,107 178,134 160,149 142,134 142,107"/>

    <!-- Row 4 (y=125) -->
    <polygon points="40,92 58,107 58,134 40,149 22,134 22,107"/>
    <polygon points="100,92 118,107 118,134 100,149 82,134 82,107"/>
    <polygon points="160,119 178,134 178,161 160,176 142,161 142,134"/>

    <!-- Row 5 (y=155) -->
    <polygon points="40,119 58,134 58,161 40,176 22,161 22,134"/>
    <polygon points="100,119 118,134 118,161 100,176 82,161 82,134"/>
    <polygon points="130,137 148,152 148,179 130,194 112,179 112,152"/>
  </g>

  <!-- ── Active F-path hexagons (firing) ── -->

  <!-- Vertical stem (column x=40, rows 1-5) -->
  <polygon points="40,38 58,53 58,80 40,95 22,80 22,53" fill="url(#h21)" opacity="0.7" stroke="url(#h21)" stroke-width="2"/>
  <polygon points="40,65 58,80 58,107 40,122 22,107 22,80" fill="url(#h21)" opacity="0.85" stroke="url(#h21)" stroke-width="2"/>
  <polygon points="40,92 58,107 58,134 40,149 22,134 22,107" fill="url(#h21)" opacity="0.7" stroke="url(#h21)" stroke-width="2"/>
  <polygon points="40,119 58,134 58,161 40,176 22,161 22,134" fill="url(#h21)" opacity="0.5" stroke="url(#h21)" stroke-width="1.5"/>

  <!-- Top arm (row 1, columns moving right) -->
  <polygon points="70,20 88,35 88,62 70,77 52,62 52,35" fill="url(#h21)" opacity="0.7" stroke="url(#h21)" stroke-width="2"/>
  <polygon points="100,38 118,53 118,80 100,95 82,80 82,53" fill="url(#h21)" opacity="0.6" stroke="url(#h21)" stroke-width="2"/>
  <polygon points="130,20 148,35 148,62 130,77 112,62 112,35" fill="url(#h21)" opacity="0.5" stroke="url(#h21)" stroke-width="1.5"/>
  <polygon points="160,38 178,53 178,80 160,95 142,80 142,53" fill="url(#h21)" opacity="0.4" stroke="url(#h21)" stroke-width="1.5"/>

  <!-- Middle arm (row 3 middle, moving right) -->
  <polygon points="70,20 88,35 88,62 70,77 52,62 52,35" fill="url(#h21)" opacity="0.5" stroke="url(#h21)" stroke-width="1.5"/>

  <!-- The F is clearly visible as the cluster of active hexagons.
       At favicon size, the active cells merge into a solid F silhouette
       against the dim grid background. -->
  <polygon points="100,92 118,107 118,134 100,149 82,134 82,107" fill="url(#h21)" opacity="0.5" stroke="url(#h21)" stroke-width="1.5"/>
  <polygon points="160,92 178,107 178,134 160,149 142,134 142,107" fill="url(#h21)" opacity="0.35" stroke="url(#h21)" stroke-width="1"/>

</svg>
