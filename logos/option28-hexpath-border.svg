<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- HEX PATH — Border
       Hexagons trace ONLY the outer border of the F letterform.
       The interior is empty.
       Like a hexagonal honeycomb cut into the shape of an F outline.
       Only the perimeter has hexagons — not the interior.
       The least dense hex option. Most air. Most elegant. -->

  <defs>
    <linearGradient id="hb28" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#92400e"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="200" height="200" rx="28" fill="#0c0c0e"/>

  <!-- Hexagon radius ~9. Only border hexagons of the F. -->

  <g fill="none" stroke="url(#hb28)" stroke-width="1.5">

    <!-- ── Left border of vertical stem ── -->
    <polygon points="38,12 50,19 50,35 38,42 26,35 26,19"/>
    <polygon points="38,38 50,45 50,61 38,68 26,61 26,45"/>
    <polygon points="38,64 50,71 50,87 38,94 26,87 26,71"/>
    <polygon points="38,90 50,97 50,113 38,120 26,113 26,97"/>
    <polygon points="38,116 50,123 50,139 38,146 26,139 26,123"/>
    <polygon points="38,142 50,149 50,165 38,172 26,165 26,149"/>
    <polygon points="38,168 50,175 50,191 38,198 26,191 26,175"/>

    <!-- ── Right border of vertical stem (below arms) ── -->
    <polygon points="68,64 80,71 80,87 68,94 56,87 56,71"/>
    <polygon points="68,90 80,97 80,113 68,120 56,113 56,97"/>
    <polygon points="68,116 80,123 80,139 68,146 56,139 56,123"/>
    <polygon points="68,142 80,149 80,165 68,172 56,165 56,149"/>
    <polygon points="68,168 80,175 80,191 68,198 56,191 56,175"/>

    <!-- ── Top border of top arm ── -->
    <polygon points="68,12 80,19 80,35 68,42 56,35 56,19"/>
    <polygon points="83,25 95,32 95,48 83,55 71,48 71,32"/>
    <polygon points="98,12 110,19 110,35 98,42 86,35 86,19"/>
    <polygon points="113,25 125,32 125,48 113,55 101,48 101,32"/>
    <polygon points="128,12 140,19 140,35 128,42 116,35 116,19"/>
    <polygon points="143,25 155,32 155,48 143,55 131,48 131,32"/>

    <!-- ── Bottom border of top arm ── -->
    <polygon points="83,12 95,19 95,35 83,42 71,35 71,19"/>
    <polygon points="113,12 125,19 125,35 113,42 101,35 101,19"/>
    <polygon points="143,12 155,19 155,35 143,42 131,35 131,19"/>

    <!-- ── Bottom border of middle arm ── -->
    <polygon points="83,90 95,97 95,113 83,120 71,113 71,97"/>
    <polygon points="98,90 110,97 110,113 98,120 86,113 86,97"/>
    <polygon points="113,90 125,97 125,113 113,120 101,113 101,97"/>

  </g>

  <!-- ── Fill a few key hexagons to anchor the F visually ── -->
  <g fill="url(#hb28)" opacity="0.25" stroke="url(#hb28)" stroke-width="1.5">
    <polygon points="38,64 50,71 50,87 38,94 26,87 26,71"/>
    <polygon points="68,12 80,19 80,35 68,42 56,35 56,19"/>
    <polygon points="68,90 80,97 80,113 68,120 56,113 56,97"/>
    <polygon points="143,25 155,32 155,48 143,55 131,48 131,32"/>
  </g>
</svg>
