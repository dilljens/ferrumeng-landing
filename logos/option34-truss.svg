<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- TRUSS F — Structural steel truss framework forming the letter F
       Triangulated beams like a radio tower or bridge truss.
       Every node is a connection joint. Every line is a structural member.
       Engineering precision at its most literal.
       No circles — just bolted/riveted joint markers at intersections. -->

  <defs>
    <linearGradient id="t34" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#92400e"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="200" height="200" rx="28" fill="#0c0c0e"/>

  <!-- Truss framework — triangulated structural beams -->

  <!-- ── Vertical tower truss (the F stem) ── -->

  <!-- Left chord -->
  <line x1="35" y1="20" x2="35" y2="180" stroke="url(#t34)" stroke-width="3" stroke-linecap="round"/>
  <!-- Right chord -->
  <line x1="60" y1="20" x2="60" y2="180" stroke="url(#t34)" stroke-width="3" stroke-linecap="round"/>

  <!-- Cross-bracing (zigzag) along vertical -->
  <line x1="35" y1="20" x2="60" y2="40" stroke="url(#t34)" stroke-width="2" opacity="0.6"/>
  <line x1="35" y1="40" x2="60" y2="20" stroke="url(#t34)" stroke-width="2" opacity="0.6"/>

  <line x1="35" y1="40" x2="60" y2="60" stroke="url(#t34)" stroke-width="2" opacity="0.6"/>
  <line x1="35" y1="60" x2="60" y2="40" stroke="url(#t34)" stroke-width="2" opacity="0.6"/>

  <line x1="35" y1="60" x2="60" y2="80" stroke="url(#t34)" stroke-width="2" opacity="0.6"/>
  <line x1="35" y1="80" x2="60" y2="60" stroke="url(#t34)" stroke-width="2" opacity="0.6"/>

  <line x1="35" y1="80" x2="60" y2="100" stroke="url(#t34)" stroke-width="2" opacity="0.6"/>
  <line x1="35" y1="100" x2="60" y2="80" stroke="url(#t34)" stroke-width="2" opacity="0.6"/>

  <line x1="35" y1="120" x2="60" y2="140" stroke="url(#t34)" stroke-width="1.5" opacity="0.5"/>
  <line x1="35" y1="140" x2="60" y2="120" stroke="url(#t34)" stroke-width="1.5" opacity="0.5"/>

  <line x1="35" y1="140" x2="60" y2="160" stroke="url(#t34)" stroke-width="1.5" opacity="0.4"/>
  <line x1="35" y1="160" x2="60" y2="140" stroke="url(#t34)" stroke-width="1.5" opacity="0.4"/>

  <!-- Horizontal rungs -->
  <line x1="35" y1="20" x2="60" y2="20" stroke="url(#t34)" stroke-width="2" opacity="0.4"/>
  <line x1="35" y1="40" x2="60" y2="40" stroke="url(#t34)" stroke-width="2" opacity="0.4"/>
  <line x1="35" y1="60" x2="60" y2="60" stroke="url(#t34)" stroke-width="2" opacity="0.4"/>
  <line x1="35" y1="80" x2="60" y2="80" stroke="url(#t34)" stroke-width="2" opacity="0.4"/>
  <line x1="35" y1="100" x2="60" y2="100" stroke="url(#t34)" stroke-width="2" opacity="0.4"/>

  <!-- ── Top arm truss (extending right) ── -->

  <!-- Top chord -->
  <line x1="60" y1="20" x2="165" y2="20" stroke="url(#t34)" stroke-width="3" stroke-linecap="round"/>
  <!-- Bottom chord -->
  <line x1="60" y1="45" x2="145" y2="45" stroke="url(#t34)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Top arm cross-bracing -->
  <line x1="80" y1="20" x2="60" y2="45" stroke="url(#t34)" stroke-width="2" opacity="0.6"/>
  <line x1="80" y1="20" x2="100" y2="45" stroke="url(#t34)" stroke-width="2" opacity="0.5"/>

  <line x1="100" y1="20" x2="80" y2="45" stroke="url(#t34)" stroke-width="1.5" opacity="0.5"/>
  <line x1="100" y1="20" x2="120" y2="45" stroke="url(#t34)" stroke-width="1.5" opacity="0.4"/>

  <line x1="120" y1="20" x2="100" y2="45" stroke="url(#t34)" stroke-width="1.5" opacity="0.4"/>
  <line x1="120" y1="20" x2="145" y2="45" stroke="url(#t34)" stroke-width="1.5" opacity="0.35"/>

  <line x1="140" y1="20" x2="145" y2="45" stroke="url(#t34)" stroke-width="1.5" opacity="0.3"/>

  <!-- Top arm rungs -->
  <line x1="80" y1="20" x2="80" y2="45" stroke="url(#t34)" stroke-width="1.5" opacity="0.3"/>
  <line x1="100" y1="20" x2="100" y2="45" stroke="url(#t34)" stroke-width="1.5" opacity="0.3"/>
  <line x1="120" y1="20" x2="120" y2="45" stroke="url(#t34)" stroke-width="1.5" opacity="0.3"/>

  <!-- ── Middle arm truss ── -->

  <!-- Top chord -->
  <line x1="60" y1="90" x2="135" y2="90" stroke="url(#t34)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Bottom chord -->
  <line x1="60" y1="115" x2="115" y2="115" stroke="url(#t34)" stroke-width="2" stroke-linecap="round"/>

  <!-- Middle arm cross-bracing -->
  <line x1="80" y1="90" x2="60" y2="115" stroke="url(#t34)" stroke-width="1.5" opacity="0.5"/>
  <line x1="80" y1="90" x2="100" y2="115" stroke="url(#t34)" stroke-width="1.5" opacity="0.4"/>

  <line x1="100" y1="90" x2="80" y2="115" stroke="url(#t34)" stroke-width="1.5" opacity="0.4"/>
  <line x1="100" y1="90" x2="115" y2="115" stroke="url(#t34)" stroke-width="1.5" opacity="0.35"/>

  <line x1="120" y1="90" x2="115" y2="115" stroke="url(#t34)" stroke-width="1.5" opacity="0.3"/>

  <!-- Middle arm rungs -->
  <line x1="80" y1="90" x2="80" y2="115" stroke="url(#t34)" stroke-width="1.5" opacity="0.25"/>
  <line x1="100" y1="90" x2="100" y2="115" stroke="url(#t34)" stroke-width="1.5" opacity="0.25"/>

  <!-- ── Rivet/bolt markers at key joints ── -->
  <g fill="#d97706" opacity="0.6">
    <circle cx="35" cy="20" r="3"/><circle cx="60" cy="20" r="3"/>
    <circle cx="35" cy="40" r="2.5"/><circle cx="60" cy="40" r="2.5"/>
    <circle cx="35" cy="60" r="2.5"/><circle cx="60" cy="60" r="2.5"/>
    <circle cx="35" cy="80" r="2.5"/><circle cx="60" cy="80" r="2.5"/>
    <circle cx="35" cy="100" r="2.5"/><circle cx="60" cy="100" r="2.5"/>
    <circle cx="35" cy="180" r="2.5"/><circle cx="60" cy="180" r="2.5"/>
    <circle cx="165" cy="20" r="2.5"/>
    <circle cx="145" cy="45" r="2.5"/>
    <circle cx="135" cy="90" r="2.5"/>
    <circle cx="115" cy="115" r="2.5"/>
  </g>
</svg>
