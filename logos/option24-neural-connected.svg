<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- NEURAL SIMPLE — Connected Dots
       A clean chain of circles connected by straight lines along the F path.
       Every circle is a junction or endpoint — no orphans.
       Lines connect consecutive circles.
       This is a "node graph" where the F is the only graph.
       No circles exist outside the F structure. -->

  <defs>
    <radialGradient id="cd24" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#b45309"/>
    </radialGradient>
    <linearGradient id="cd24b" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#92400e"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="200" height="200" rx="28" fill="#0c0c0e"/>

  <!-- Connection lines — joining circles along the F -->
  <line x1="50" y1="28" x2="50" y2="58" stroke="url(#cd24b)" stroke-width="2.5" opacity="0.3"/>
  <line x1="50" y1="58" x2="50" y2="88" stroke="url(#cd24b)" stroke-width="2.5" opacity="0.3"/>
  <line x1="50" y1="88" x2="50" y2="120" stroke="url(#cd24b)" stroke-width="2" opacity="0.25"/>
  <line x1="50" y1="120" x2="50" y2="150" stroke="url(#cd24b)" stroke-width="2" opacity="0.2"/>
  <line x1="50" y1="150" x2="50" y2="172" stroke="url(#cd24b)" stroke-width="1.5" opacity="0.15"/>

  <line x1="50" y1="28" x2="80" y2="28" stroke="url(#cd24b)" stroke-width="2.5" opacity="0.3"/>
  <line x1="80" y1="28" x2="110" y2="28" stroke="url(#cd24b)" stroke-width="2.5" opacity="0.3"/>
  <line x1="110" y1="28" x2="140" y2="28" stroke="url(#cd24b)" stroke-width="2" opacity="0.25"/>
  <line x1="140" y1="28" x2="160" y2="28" stroke="url(#cd24b)" stroke-width="1.5" opacity="0.2"/>

  <line x1="50" y1="88" x2="80" y2="88" stroke="url(#cd24b)" stroke-width="2.5" opacity="0.3"/>
  <line x1="80" y1="88" x2="110" y2="88" stroke="url(#cd24b)" stroke-width="2" opacity="0.25"/>
  <line x1="110" y1="88" x2="130" y2="88" stroke="url(#cd24b)" stroke-width="1.5" opacity="0.2"/>

  <!-- Cross connections — single diagonal per arm for the "neural" feel -->
  <line x1="80" y1="28" x2="50" y2="58" stroke="url(#cd24b)" stroke-width="1.5" opacity="0.15"/>
  <line x1="80" y1="88" x2="50" y2="120" stroke="url(#cd24b)" stroke-width="1.5" opacity="0.12"/>

  <!-- Circles — ONLY at junctions and endpoints along the F -->
  <circle cx="50" cy="28" r="7" fill="url(#cd24)"/>
  <circle cx="50" cy="58" r="5" fill="url(#cd24)"/>
  <circle cx="50" cy="88" r="7" fill="url(#cd24)"/>
  <circle cx="50" cy="120" r="5" fill="url(#cd24)"/>
  <circle cx="50" cy="150" r="4" fill="url(#cd24)"/>
  <circle cx="50" cy="172" r="3" fill="url(#cd24)"/>

  <circle cx="80" cy="28" r="5" fill="url(#cd24)"/>
  <circle cx="110" cy="28" r="5" fill="url(#cd24)"/>
  <circle cx="140" cy="28" r="4" fill="url(#cd24)"/>
  <circle cx="160" cy="28" r="5" fill="url(#cd24)"/>

  <circle cx="80" cy="88" r="5" fill="url(#cd24)"/>
  <circle cx="110" cy="88" r="4" fill="url(#cd24)"/>
  <circle cx="130" cy="88" r="4" fill="url(#cd24)"/>
</svg>
