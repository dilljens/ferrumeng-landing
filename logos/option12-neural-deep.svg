<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- NEURAL F — Deep
       A deep neural network with multiple stacked layers.
       Each column is a layer of neurons; connections flow left to right.
       The F emerges from the width of each layer:
         Layer 1 (input): tall column (vertical of F)
         Layer 2 (hidden): 3 neurons (the F top bar)
         Layer 3 (hidden): 2 neurons (the F middle bar)
         Layer 4 (output): 1 neuron (the F bottom point)
       This is a literal neural net architecture diagram in logo form.
       Machine learning engineers will immediately recognize the layer structure. -->

  <defs>
    <linearGradient id="n12" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#92400e"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="200" height="200" rx="28" fill="#0c0c0e"/>

  <!-- ── Inter-layer connections ── -->

  <!-- Layer 1 (input) → Layer 2 (hidden1): 5→3 fully connected -->
  <line x1="60" y1="30" x2="105" y2="40" stroke="url(#n12)" stroke-width="1.2" opacity="0.15"/>
  <line x1="60" y1="30" x2="105" y2="100" stroke="url(#n12)" stroke-width="1.2" opacity="0.15"/>
  <line x1="60" y1="30" x2="105" y2="160" stroke="url(#n12)" stroke-width="1.2" opacity="0.15"/>
  <line x1="60" y1="80" x2="105" y2="40" stroke="url(#n12)" stroke-width="1.2" opacity="0.15"/>
  <line x1="60" y1="80" x2="105" y2="100" stroke="url(#n12)" stroke-width="1.2" opacity="0.15"/>
  <line x1="60" y1="80" x2="105" y2="160" stroke="url(#n12)" stroke-width="1.2" opacity="0.15"/>
  <line x1="60" y1="130" x2="105" y2="40" stroke="url(#n12)" stroke-width="1.2" opacity="0.15"/>
  <line x1="60" y1="130" x2="105" y2="100" stroke="url(#n12)" stroke-width="1.2" opacity="0.15"/>
  <line x1="60" y1="130" x2="105" y2="160" stroke="url(#n12)" stroke-width="1.2" opacity="0.15"/>
  <line x1="60" y1="170" x2="105" y2="40" stroke="url(#n12)" stroke-width="1.2" opacity="0.12"/>
  <line x1="60" y1="170" x2="105" y2="100" stroke="url(#n12)" stroke-width="1.2" opacity="0.12"/>
  <line x1="60" y1="170" x2="105" y2="160" stroke="url(#n12)" stroke-width="1.2" opacity="0.12"/>

  <!-- Layer 2 (hidden1) → Layer 3 (hidden2): 3→2 -->
  <line x1="105" y1="40" x2="145" y2="68" stroke="url(#n12)" stroke-width="1.5" opacity="0.2"/>
  <line x1="105" y1="40" x2="145" y2="130" stroke="url(#n12)" stroke-width="1.5" opacity="0.2"/>
  <line x1="105" y1="100" x2="145" y2="68" stroke="url(#n12)" stroke-width="1.5" opacity="0.2"/>
  <line x1="105" y1="100" x2="145" y2="130" stroke="url(#n12)" stroke-width="1.5" opacity="0.2"/>
  <line x1="105" y1="160" x2="145" y2="68" stroke="url(#n12)" stroke-width="1.5" opacity="0.18"/>
  <line x1="105" y1="160" x2="145" y2="130" stroke="url(#n12)" stroke-width="1.5" opacity="0.18"/>

  <!-- Layer 3 (hidden2) → Layer 4 (output): 2→1 -->
  <line x1="145" y1="68" x2="175" y2="98" stroke="url(#n12)" stroke-width="2" opacity="0.25"/>
  <line x1="145" y1="130" x2="175" y2="98" stroke="url(#n12)" stroke-width="2" opacity="0.25"/>

  <!-- ── Layer 1: Input (5 neurons — tall column = F vertical stroke) ── -->
  <circle cx="60" cy="30" r="6" fill="url(#n12)"/>
  <circle cx="60" cy="80" r="6" fill="url(#n12)"/>
  <circle cx="60" cy="130" r="6" fill="url(#n12)"/>
  <circle cx="60" cy="170" r="6" fill="url(#n12)"/>

  <!-- ── Layer 2: Hidden 1 (3 neurons — top arm of F) ── -->
  <circle cx="105" cy="40" r="7" fill="url(#n12)"/>
  <circle cx="105" cy="100" r="7" fill="url(#n12)"/>
  <circle cx="105" cy="160" r="7" fill="url(#n12)"/>

  <!-- ── Layer 3: Hidden 2 (2 neurons — middle arm of F) ── -->
  <circle cx="145" cy="68" r="6" fill="url(#n12)"/>
  <circle cx="145" cy="130" r="6" fill="url(#n12)"/>

  <!-- ── Layer 4: Output (1 neuron — tip of F) ── -->
  <circle cx="175" cy="98" r="8" fill="url(#n12)"/>

  <!-- Highlight the output — the "answer" the network produces -->
  <circle cx="175" cy="98" r="8" fill="#f59e0b" opacity="0.3"/>
  <circle cx="175" cy="98" r="3" fill="#f59e0b"/>
</svg>
