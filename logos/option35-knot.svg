<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- KNOT F — A continuous ribbon that loops and knots into an F
       Like a mathematical knot or an Möbius strip.
       The ribbon enters from the bottom, loops through itself three times,
       and the crossings naturally form the three bars of an F.
       No circles. A single continuous path.
       Suggests complexity, interconnectedness, and elegance.
       Over/under crossings create depth. -->

  <defs>
    <linearGradient id="k35" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="50%" stop-color="#b45309"/>
      <stop offset="100%" stop-color="#78350f"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="200" height="200" rx="28" fill="#0c0c0e"/>

  <!-- The ribbon is a thick path with a thinner "shadow" to create
       over/under illusion. The ribbon weaves: bottom→up→top arm→
       back across→down→middle arm→back→down to base. -->

  <!-- Shadow/background pass (darker, sits "under" at crossings) -->
  <path d="M50 180
           C50 140, 50 100, 50 60
           C50 25, 55 18, 70 18
           C100 18, 130 18, 155 18
           C165 18, 168 25, 165 35
           C160 45, 140 43, 125 43
           C105 43, 80 43, 70 43
           C55 43, 52 55, 52 70
           C52 85, 55 90, 65 90
           C80 90, 100 90, 125 90
           C140 90, 145 95, 145 105
           C145 115, 140 120, 125 120
           C105 120, 80 120, 65 120
           C55 120, 52 130, 52 150
           C52 165, 50 175, 50 180"
        stroke="#451a03" stroke-width="16" fill="none"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Foreground ribbon (bright, sits "over" at crossings) -->
  <path d="M50 180
           C50 140, 50 100, 50 60
           C50 25, 55 18, 70 18
           C100 18, 130 18, 155 18
           C165 18, 168 25, 165 35
           C160 45, 140 43, 125 43
           C105 43, 80 43, 70 43
           C55 43, 52 55, 52 70
           C52 85, 55 90, 65 90
           C80 90, 100 90, 125 90
           C140 90, 145 95, 145 105
           C145 115, 140 120, 125 120
           C105 120, 80 120, 65 120
           C55 120, 52 130, 52 150
           C52 165, 50 175, 50 180"
        stroke="url(#k35)" stroke-width="12" fill="none"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Highlight stripe along the ribbon center — gives it a 3D rounded-tube look -->
  <path d="M50 180
           C50 140, 50 100, 50 60
           C50 25, 55 18, 70 18
           C100 18, 130 18, 155 18
           C165 18, 168 25, 165 35
           C160 45, 140 43, 125 43
           C105 43, 80 43, 70 43
           C55 43, 52 55, 52 70
           C52 85, 55 90, 65 90
           C80 90, 100 90, 125 90
           C140 90, 145 95, 145 105
           C145 115, 140 120, 125 120
           C105 120, 80 120, 65 120
           C55 120, 52 130, 52 150
           C52 165, 50 175, 50 180"
        stroke="#f59e0b" stroke-width="3" fill="none"
        stroke-linecap="round" stroke-linejoin="round" opacity="0.3"/>

  <!-- The three crossings create the F:
       1. The vertical stem is the ribbon running from bottom to top
       2. The top arm is the ribbon's first horizontal loop
       3. The middle arm is the ribbon's second horizontal pass
       Every part of the ribbon is structurally necessary. -->
</svg>
