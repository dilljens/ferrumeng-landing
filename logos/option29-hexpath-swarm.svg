<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- HEX PATH — Swarm
       Hexagons clustered along the F path, like a swarm or flock.
       The hexagons get smaller at the edges — like a gradient of density
       that defines the F through clustering.
       Dense in the center of each F stroke, sparse at the edges.
       Like a heatmap of neural activity made of hex cells. -->

  <defs>
    <radialGradient id="hs29" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="60%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#78350f"/>
    </radialGradient>
    <linearGradient id="hs29b" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#92400e"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="200" height="200" rx="28" fill="#0c0c0e"/>

  <!-- Hexagons at varying sizes to create a density gradient along the F -->

  <!-- ── Core vertical (large hexes, densely packed) ── -->
  <g fill="url(#hs29)" opacity="0.75" stroke="url(#hs29b)" stroke-width="1">
    <polygon points="46,20 56,26 56,40 46,46 36,40 36,26"/>
    <polygon points="46,48 56,54 56,68 46,74 36,68 36,54"/>
    <polygon points="46,76 56,82 56,96 46,102 36,96 36,82"/>
    <polygon points="46,104 56,110 56,124 46,130 36,124 36,110"/>
    <polygon points="46,132 56,138 56,152 46,158 36,152 36,138"/>
    <polygon points="46,160 56,166 56,180 46,186 36,180 36,166"/>
  </g>

  <!-- ── Core top arm ── -->
  <g fill="url(#hs29)" opacity="0.75" stroke="url(#hs29b)" stroke-width="1">
    <polygon points="68,12 78,18 78,32 68,38 58,32 58,18"/>
    <polygon points="90,12 100,18 100,32 90,38 80,32 80,18"/>
    <polygon points="112,12 122,18 122,32 112,38 102,32 102,18"/>
    <polygon points="134,12 144,18 144,32 134,38 124,32 124,18"/>
    <polygon points="156,12 166,18 166,32 156,38 146,32 146,18"/>
  </g>

  <!-- ── Core middle arm ── -->
  <g fill="url(#hs29)" opacity="0.75" stroke="url(#hs29b)" stroke-width="1">
    <polygon points="68,104 78,110 78,124 68,130 58,124 58,110"/>
    <polygon points="90,104 100,110 100,124 90,130 80,124 80,110"/>
    <polygon points="112,104 122,110 122,124 112,130 102,124 102,110"/>
  </g>

  <!-- ── Outer ring (smaller hexes, lower opacity — the swarm edge) ── -->

  <!-- Vertical edge -->
  <g fill="url(#hs29)" opacity="0.3" stroke="url(#hs29b)" stroke-width="0.8">
    <polygon points="30,22 37,27 37,37 30,42 23,37 23,27"/>
    <polygon points="30,50 37,55 37,65 30,70 23,65 23,55"/>
    <polygon points="30,78 37,83 37,93 30,98 23,93 23,83"/>
    <polygon points="30,106 37,111 37,121 30,126 23,121 23,111"/>
    <polygon points="30,134 37,139 37,149 30,154 23,149 23,139"/>
    <polygon points="30,162 37,167 37,177 30,182 23,177 23,167"/>
  </g>

  <!-- Top arm edge -->
  <g fill="url(#hs29)" opacity="0.3" stroke="url(#hs29b)" stroke-width="0.8">
    <polygon points="67,2 74,7 74,17 67,22 60,17 60,7"/>
    <polygon points="89,2 96,7 96,17 89,22 82,17 82,7"/>
    <polygon points="111,2 118,7 118,17 111,22 104,17 104,7"/>
    <polygon points="133,2 140,7 140,17 133,22 126,17 126,7"/>
    <polygon points="155,2 162,7 162,17 155,22 148,17 148,7"/>
  </g>

  <!-- Middle arm edge -->
  <g fill="url(#hs29)" opacity="0.3" stroke="url(#hs29b)" stroke-width="0.8">
    <polygon points="67,94 74,99 74,109 67,114 60,109 60,99"/>
    <polygon points="89,94 96,99 96,109 89,114 82,109 82,99"/>
    <polygon points="111,94 118,99 118,109 111,114 104,109 104,99"/>
    <polygon points="133,104 140,109 140,119 133,124 126,119 126,109"/>
  </g>

  <!-- Bottom taper edge -->
  <g fill="url(#hs29)" opacity="0.2" stroke="url(#hs29b)" stroke-width="0.8">
    <polygon points="60,162 67,167 67,177 60,182 53,177 53,167"/>
    <polygon points="72,168 79,173 79,183 72,188 65,183 65,173"/>
  </g>
</svg>
