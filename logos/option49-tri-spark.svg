<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- TRIANGLE SPARK — Sharp triangles radiating to form the F
       Like a crystal shattering into shards that happen to spell F.
       Triangles radiate from a central axis, growing larger outward.
       Each shard has a different copper tone and angle.
       The F emerges from the density and direction of shards.
       Sharp, aggressive, energetic. -->

  <defs>
    <linearGradient id="k49a" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="k49b" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <linearGradient id="k49c" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b45309"/>
      <stop offset="100%" stop-color="#92400e"/>
    </linearGradient>
    <linearGradient id="k49d" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#92400e"/>
      <stop offset="100%" stop-color="#78350f"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="200" height="200" rx="28" fill="#0c0c0e"/>

  <!-- Each triangle shard is defined by three points.
       The shards cluster along the F's path,
       radiating outward from the center of each stroke. -->

  <g stroke="#0c0c0e" stroke-width="0.7">

    <!-- ── VERTICAL STEM SHARDS ── radiating from center of the vertical -->

    <!-- Top of vertical -->
    <polygon points="50,10 30,30 50,25" fill="url(#k49a)" opacity="0.95"/>
    <polygon points="50,10 50,25 70,20" fill="url(#k49b)" opacity="0.95"/>
    <polygon points="30,30 50,25 20,45" fill="url(#k49b)" opacity="0.9"/>
    <polygon points="50,25 70,20 60,45" fill="url(#k49a)" opacity="0.9"/>

    <!-- Upper vertical -->
    <polygon points="20,45 50,25 35,60" fill="url(#k49c)" opacity="0.9"/>
    <polygon points="60,45 70,20 80,50" fill="url(#k49b)" opacity="0.85"/>
    <polygon points="35,60 50,25 50,50" fill="url(#k49b)" opacity="0.9"/>
    <polygon points="50,50 70,20 75,55" fill="url(#k49a)" opacity="0.85"/>

    <!-- Mid vertical -->
    <polygon points="35,60 50,50 30,80" fill="url(#k49c)" opacity="0.85"/>
    <polygon points="75,55 70,20 90,60" fill="url(#k49c)" opacity="0.8"/>
    <polygon points="30,80 50,50 45,85" fill="url(#k49d)" opacity="0.8"/>
    <polygon points="50,50 75,55 60,85" fill="url(#k49b)" opacity="0.85"/>

    <!-- Center vertical -->
    <polygon points="45,85 50,50 65,80" fill="url(#k49c)" opacity="0.85"/>
    <polygon points="65,80 75,55 85,85" fill="url(#k49c)" opacity="0.8"/>
    <polygon points="30,80 45,85 25,105" fill="url(#k49d)" opacity="0.75"/>
    <polygon points="85,85 75,55 95,95" fill="url(#k49d)" opacity="0.75"/>

    <!-- Lower vertical -->
    <polygon points="25,105 45,85 35,125" fill="url(#k49d)" opacity="0.75"/>
    <polygon points="45,85 65,80 55,115" fill="url(#k49c)" opacity="0.8"/>
    <polygon points="85,85 95,95 85,115" fill="url(#k49d)" opacity="0.7"/>
    <polygon points="65,80 85,85 75,110" fill="url(#k49c)" opacity="0.75"/>

    <!-- Bottom vertical -->
    <polygon points="35,125 45,85 40,150" fill="url(#k49d)" opacity="0.7"/>
    <polygon points="55,115 65,80 65,130" fill="url(#k49d)" opacity="0.75"/>
    <polygon points="65,130 75,110 85,135" fill="url(#k49d)" opacity="0.65"/>
    <polygon points="40,150 55,115 50,170" fill="url(#k49d)" opacity="0.6"/>
    <polygon points="50,170 65,130 55,185" fill="url(#k49d)" opacity="0.55"/>
    <polygon points="85,135 75,110 90,145" fill="url(#k49d)" opacity="0.6"/>

  </g>

  <!-- ── TOP ARM SHARDS ── radiating rightward -->

  <g stroke="#0c0c0e" stroke-width="0.7">

    <polygon points="75,25 60,45 95,30" fill="url(#k49a)" opacity="0.95"/>
    <polygon points="75,25 95,30 85,10" fill="url(#k49a)" opacity="0.95"/>
    <polygon points="95,30 85,10 115,15" fill="url(#k49a)" opacity="0.9"/>

    <polygon points="95,30 75,25 105,40" fill="url(#k49b)" opacity="0.9"/>
    <polygon points="115,15 95,30 120,25" fill="url(#k49b)" opacity="0.85"/>
    <polygon points="105,40 95,30 120,45" fill="url(#k49b)" opacity="0.85"/>

    <polygon points="120,25 115,15 140,20" fill="url(#k49b)" opacity="0.85"/>
    <polygon points="120,45 105,40 135,50" fill="url(#k49c)" opacity="0.8"/>
    <polygon points="140,20 120,25 150,30" fill="url(#k49b)" opacity="0.8"/>

    <polygon points="150,30 140,20 165,25" fill="url(#k49c)" opacity="0.75"/>
    <polygon points="135,50 120,45 150,55" fill="url(#k49c)" opacity="0.75"/>

  </g>

  <!-- ── MIDDLE ARM SHARDS ── radiating rightward from center -->

  <g stroke="#0c0c0e" stroke-width="0.7">

    <polygon points="60,85 45,105 80,95" fill="url(#k49c)" opacity="0.85"/>
    <polygon points="60,85 80,95 70,75" fill="url(#k49b)" opacity="0.85"/>
    <polygon points="80,95 70,75 100,85" fill="url(#k49c)" opacity="0.85"/>

    <polygon points="80,95 60,105 95,105" fill="url(#k49d)" opacity="0.8"/>
    <polygon points="100,85 80,95 115,95" fill="url(#k49c)" opacity="0.8"/>
    <polygon points="95,105 80,105 110,115" fill="url(#k49d)" opacity="0.75"/>

    <polygon points="115,95 100,85 130,100" fill="url(#k49d)" opacity="0.75"/>
    <polygon points="110,115 95,105 125,120" fill="url(#k49d)" opacity="0.7"/>
    <polygon points="130,100 115,95 140,105" fill="url(#k49d)" opacity="0.7"/>

  </g>

  <!-- The shards cluster densely along the F path, with empty space elsewhere.
       The F is defined by where the shards are concentrated.
       Top arm (y≈10-50) and middle arm (y≈75-120) have a clear gap of
       shard-free vertical between them. -->
</svg>
