<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- NEURAL F — Pulse
       A neural network with a signal traveling through it.
       Nodes glow brighter as the pulse passes through them (activation cascade).
       The F emerges from which nodes are lit — like a heatmap of network activity.
       Three "time slices" of a pulse moving from bottom to top through the F structure.
       At rest it looks like connected nodes. Under scrutiny, the F appears. -->

  <defs>
    <radialGradient id="n11a" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="60%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#78350f"/>
    </radialGradient>
    <linearGradient id="n11b" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#92400e"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="200" height="200" rx="28" fill="#0c0c0e"/>

  <!-- Background connections — the whole network structure -->
  <line x1="55" y1="25" x2="55" y2="175" stroke="url(#n11b)" stroke-width="2" opacity="0.15"/>
  <line x1="55" y1="40" x2="150" y2="40" stroke="url(#n11b)" stroke-width="2" opacity="0.15"/>
  <line x1="55" y1="100" x2="135" y2="100" stroke="url(#n11b)" stroke-width="2" opacity="0.15"/>
  <line x1="55" y1="160" x2="120" y2="160" stroke="url(#n11b)" stroke-width="1.5" opacity="0.1"/>

  <!-- Cross connections -->
  <line x1="100" y1="40" x2="55" y2="100" stroke="url(#n11b)" stroke-width="1.5" opacity="0.12"/>
  <line x1="135" y1="100" x2="55" y2="160" stroke="url(#n11b)" stroke-width="1.5" opacity="0.1"/>
  <line x1="150" y1="40" x2="135" y2="100" stroke="url(#n11b)" stroke-width="1.5" opacity="0.12"/>
  <line x1="120" y1="160" x2="55" y2="175" stroke="url(#n11b)" stroke-width="1" opacity="0.08"/>

  <!-- Recurrent (looping) connection — suggests continuous learning -->
  <path d="M135 100 Q165 70 150 40" stroke="url(#n11b)" stroke-width="1.5" opacity="0.1" fill="none"/>

  <!-- Bottom-of-network nodes (pre-pulse — dim) -->
  <circle cx="55" cy="175" r="6" fill="#78350f" opacity="0.4"/>
  <circle cx="120" cy="160" r="5" fill="#78350f" opacity="0.3"/>
  <circle cx="55" cy="160" r="5" fill="#78350f" opacity="0.35"/>

  <!-- Mid-network nodes (pulse arriving — starting to glow) -->
  <circle cx="55" cy="100" r="7" fill="url(#n11a)" opacity="0.9"/>
  <circle cx="55" cy="125" r="5" fill="#92400e" opacity="0.6"/>
  <circle cx="100" cy="100" r="4" fill="#d97706" opacity="0.5"/>
  <circle cx="135" cy="100" r="6" fill="url(#n11a)" opacity="0.7"/>

  <!-- Top-of-network nodes (post-pulse — still glowing, fading) -->
  <circle cx="55" cy="25" r="7" fill="url(#n11a)" opacity="0.6"/>
  <circle cx="55" cy="40" r="4" fill="#d97706" opacity="0.4"/>
  <circle cx="55" cy="68" r="5" fill="#92400e" opacity="0.45"/>
  <circle cx="100" cy="40" r="5" fill="#d97706" opacity="0.35"/>
  <circle cx="135" cy="40" r="4" fill="#d97706" opacity="0.3"/>
  <circle cx="150" cy="40" r="6" fill="url(#n11a)" opacity="0.45"/>

  <!-- The pulse front — brightest nodes where signal is currently active -->
  <circle cx="55" cy="100" r="7" fill="#f59e0b"/>
  <circle cx="135" cy="100" r="6" fill="#f59e0b"/>
  <circle cx="100" cy="100" r="4" fill="#f59e0b" opacity="0.7"/>

  <!-- Glow halos on the active nodes -->
  <circle cx="55" cy="100" r="12" fill="#f59e0b" opacity="0.08"/>
  <circle cx="135" cy="100" r="10" fill="#f59e0b" opacity="0.06"/>
</svg>
