<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- CHIP + MIND — Simple
       A stripped-down, favicon-optimized chip logo.
       Only 6 pins total (3L, 3R). Bigger chip body, more visible F inside.
       The F is made of glowing neural trace lines — not straight PCB routes,
       but slightly curved organic paths (the "mind" inside the "chip").
       This is the most readable chip logo at small sizes. -->

  <defs>
    <linearGradient id="c13" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#92400e"/>
    </linearGradient>
    <linearGradient id="c13b" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="200" height="200" rx="28" fill="#0c0c0e"/>

  <!-- Chip body — larger, cleaner -->
  <rect x="48" y="35" width="104" height="130" rx="10" fill="none" stroke="url(#c13)" stroke-width="3"/>

  <!-- Left pins (3) -->
  <rect x="30" y="60" width="18" height="8" rx="2" fill="url(#c13)"/>
  <rect x="30" y="96" width="18" height="8" rx="2" fill="url(#c13)"/>
  <rect x="30" y="132" width="18" height="8" rx="2" fill="url(#c13)"/>

  <!-- Right pins (3) -->
  <rect x="152" y="60" width="18" height="8" rx="2" fill="url(#c13)"/>
  <rect x="152" y="96" width="18" height="8" rx="2" fill="url(#c13)"/>
  <rect x="152" y="132" width="18" height="8" rx="2" fill="url(#c13)"/>

  <!-- Die inner glow — the "mind" region -->
  <rect x="58" y="45" width="84" height="110" rx="6" fill="url(#c13b)" opacity="0.06"/>

  <!-- Organic neural trace forming the F — curved, not straight (biological) -->
  <!-- Vertical path with a slight organic curve -->
  <path d="M78 52 C78 80 78 100 78 148" stroke="url(#c13b)" stroke-width="5" stroke-linecap="round" fill="none"/>

  <!-- Top arm — organic curve, not rigid -->
  <path d="M78 52 C100 48 118 52 132 52" stroke="url(#c13b)" stroke-width="5" stroke-linecap="round" fill="none"/>

  <!-- Middle arm — shorter, organic curve -->
  <path d="M78 98 C95 96 108 98 118 98" stroke="url(#c13b)" stroke-width="4.5" stroke-linecap="round" fill="none"/>

  <!-- Connection points — "synapses" where traces meet -->
  <circle cx="78" cy="52" r="5" fill="#f59e0b"/>
  <circle cx="78" cy="98" r="5" fill="#f59e0b"/>
  <circle cx="78" cy="148" r="4" fill="#f59e0b" opacity="0.8"/>
  <circle cx="132" cy="52" r="3" fill="#f59e0b" opacity="0.7"/>
  <circle cx="118" cy="98" r="3" fill="#f59e0b" opacity="0.7"/>

  <!-- Tiny floating particles — bio-neural detail -->
  <circle cx="95" cy="72" r="1.5" fill="#f59e0b" opacity="0.3"/>
  <circle cx="105" cy="120" r="1.5" fill="#f59e0b" opacity="0.25"/>
  <circle cx="115" cy="80" r="1" fill="#f59e0b" opacity="0.2"/>
</svg>
