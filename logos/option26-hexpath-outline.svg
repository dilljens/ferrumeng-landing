<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- HEX PATH — Outline
       Hexagons arranged specifically to trace the outline of a capital F.
       Unlike the full-grid approach, these hexagons are placed only along the
       F's contour — like a dotted line made of hexagons.
       Each hexagon has a purpose. No hexagons outside the F. -->

  <defs>
    <linearGradient id="ho26" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#92400e"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="200" height="200" rx="28" fill="#0c0c0e"/>

  <!-- Each hexagon defined as a polygon. Pointy-top orientation.
       Radius ~10. Positions carefully chosen to trace the F letterform. -->

  <!-- ── Vertical column (F stem) ── -->
  <g fill="none" stroke="url(#ho26)" stroke-width="1.5">
    <polygon points="50,15 64,23 64,42 50,50 36,42 36,23"/>
    <polygon points="50,45 64,53 64,72 50,80 36,72 36,53"/>
    <polygon points="50,75 64,83 64,102 50,110 36,102 36,83"/>
    <polygon points="50,105 64,113 64,132 50,140 36,132 36,113"/>
    <polygon points="50,135 64,143 64,162 50,170 36,162 36,143"/>
    <polygon points="50,165 64,173 64,192 50,200 36,192 36,173"/>
  </g>

  <!-- ── Filled hexagons in the vertical (core of the F stem) ── -->
  <g fill="url(#ho26)" opacity="0.08" stroke="url(#ho26)" stroke-width="1.5">
    <polygon points="50,15 64,23 64,42 50,50 36,42 36,23"/>
    <polygon points="50,45 64,53 64,72 50,80 36,72 36,53"/>
    <polygon points="50,75 64,83 64,102 50,110 36,102 36,83"/>
  </g>

  <!-- ── Top arm ── -->
  <g fill="none" stroke="url(#ho26)" stroke-width="1.5">
    <polygon points="76,1 90,9 90,28 76,36 62,28 62,9"/>
    <polygon points="102,1 116,9 116,28 102,36 88,28 88,9"/>
    <polygon points="128,1 142,9 142,28 128,36 114,28 114,9"/>
    <polygon points="154,1 168,9 168,28 154,36 140,28 140,9"/>
  </g>

  <!-- ── Filled hexagons in top arm (core) ── -->
  <g fill="url(#ho26)" opacity="0.12" stroke="url(#ho26)" stroke-width="1.5">
    <polygon points="76,1 90,9 90,28 76,36 62,28 62,9"/>
    <polygon points="128,1 142,9 142,28 128,36 114,28 114,9"/>
  </g>

  <!-- ── Middle arm (starts after vertical, goes right, slightly fills) ── -->
  <g fill="none" stroke="url(#ho26)" stroke-width="1.5">
    <polygon points="50,105 64,113 64,132 50,140 36,132 36,113"/>
    <polygon points="76,105 90,113 90,132 76,140 62,132 62,113"/>
    <polygon points="102,105 116,113 116,132 102,140 88,132 88,113"/>
  </g>

  <!-- ── Filled hexagons in middle arm ── -->
  <g fill="url(#ho26)" opacity="0.12" stroke="url(#ho26)" stroke-width="1.5">
    <polygon points="50,105 64,113 64,132 50,140 36,132 36,113"/>
    <polygon points="102,105 116,113 116,132 102,140 88,132 88,113"/>
  </g>

  <!-- The concept: hexagons placed specifically to outline the F,
       like a mosaic made of hexagonal tiles. Only enough hexagons
       to clearly read as F — no excess, no grid noise. -->
</svg>
