<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Concept: CHIP + MIND
       A microprocessor die (hardware) with neural pathways etched into the silicon (AI).
       The chip outline is a classic IC package with pins.
       Inside the die, three bright traces form the "F" — connecting the hardware shell
       to the intelligence within.
       This is the hybrid option: the outer shape says "chip," the inner pattern says "AI."
       B&W safe. Favicon reads as a chip with an F inside. -->

  <defs>
    <linearGradient id="g9" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#92400e"/>
    </linearGradient>
    <linearGradient id="g9b" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <!-- container -->
  <rect x="0" y="0" width="200" height="200" rx="28" fill="#0c0c0e"/>

  <!-- IC package body (the chip die) — rounded square -->
  <rect x="48" y="42" width="104" height="116" rx="8" fill="none" stroke="url(#g9)" stroke-width="3"/>

  <!-- IC pins — left side (6 pins) -->
  <rect x="30" y="58" width="18" height="6" rx="2" fill="url(#g9)"/>
  <rect x="30" y="78" width="18" height="6" rx="2" fill="url(#g9)"/>
  <rect x="30" y="98" width="18" height="6" rx="2" fill="url(#g9)"/>
  <rect x="30" y="118" width="18" height="6" rx="2" fill="url(#g9)"/>
  <rect x="30" y="138" width="18" height="6" rx="2" fill="url(#g9)"/>

  <!-- IC pins — right side (4 pins) -->
  <rect x="152" y="68" width="18" height="6" rx="2" fill="url(#g9)"/>
  <rect x="152" y="88" width="18" height="6" rx="2" fill="url(#g9)"/>
  <rect x="152" y="108" width="18" height="6" rx="2" fill="url(#g9)"/>
  <rect x="152" y="128" width="18" height="6" rx="2" fill="url(#g9)"/>

  <!-- IC pins — top (3 pins) -->
  <rect x="72" y="24" width="6" height="18" rx="2" fill="url(#g9)"/>
  <rect x="97" y="24" width="6" height="18" rx="2" fill="url(#g9)"/>
  <rect x="122" y="24" width="6" height="18" rx="2" fill="url(#g9)"/>

  <!-- IC pins — bottom (3 pins) -->
  <rect x="72" y="158" width="6" height="18" rx="2" fill="url(#g9)"/>
  <rect x="97" y="158" width="6" height="18" rx="2" fill="url(#g9)"/>
  <rect x="122" y="158" width="6" height="18" rx="2" fill="url(#g9)"/>

  <!-- Silicon die inner region — slightly darker -->
  <rect x="56" y="50" width="88" height="100" rx="4" fill="url(#g9)" opacity="0.08"/>

  <!-- Neural traces inside the die — these form the "F" -->
  <!-- Vertical pathway -->
  <path d="M78 56 L78 142" stroke="url(#g9b)" stroke-width="5" stroke-linecap="round"/>

  <!-- Top horizontal pathway -->
  <path d="M78 56 L126 56" stroke="url(#g9b)" stroke-width="5" stroke-linecap="round"/>

  <!-- Middle horizontal pathway (slightly offset for chip-like routing) -->
  <path d="M78 96 L110 96" stroke="url(#g9b)" stroke-width="4.5" stroke-linecap="round"/>

  <!-- Small via dots at trace ends — like real chip routing -->
  <circle cx="78" cy="56" r="4" fill="#f59e0b"/>
  <circle cx="78" cy="96" r="4" fill="#f59e0b"/>
  <circle cx="78" cy="142" r="4" fill="#f59e0b"/>
  <circle cx="126" cy="56" r="3" fill="#f59e0b" opacity="0.8"/>
  <circle cx="110" cy="96" r="3" fill="#f59e0b" opacity="0.8"/>

  <!-- Tiny filler tracework — sub-resolution detail that at larger sizes says "chip" -->
  <path d="M92 70 L92 80 L100 80" stroke="url(#g9)" stroke-width="1.5" opacity="0.3" fill="none"/>
  <path d="M100 110 L100 125 L108 125" stroke="url(#g9)" stroke-width="1.5" opacity="0.25" fill="none"/>
  <path d="M120 76 L120 130" stroke="url(#g9)" stroke-width="1.5" opacity="0.2" fill="none"/>

  <!-- Notch in the IC — orientation marker (real chips have these) -->
  <circle cx="48" cy="42" r="4" fill="#0c0c0e" stroke="url(#g9)" stroke-width="1.5"/>
</svg>
